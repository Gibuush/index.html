<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Boda Blanca y Manuel</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;600&display=swap" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0; padding: 0;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            width: 100vw;
            overflow-x: hidden;
            font-family: 'Poppins', sans-serif;
        }

        /* Imagen de fondo desenfocada */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: url('3.jpg');
            background-size: cover;
            background-position: center;
            filter: blur(12px) brightness(0.6); 
            z-index: -1;
        }

        .contenedor-principal {
            position: relative;
            width: 90%;
            max-width: 500px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .imagen-capa {
            width: 100%;
            height: auto;
            border-radius: 8px; 
            box-shadow: 0 15px 40px rgba(0,0,0,0.7);
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Sobre con animación sincronizada de 5s */
        .sobre { 
            position: relative; 
            z-index: 100; 
            cursor: pointer;
            animation: sobre-ritmo 5s ease-in-out infinite;
            transform-origin: bottom center;
        }

        @keyframes sobre-ritmo {
            0%, 100% { transform: rotate(0deg) scale(1); }
            25% { transform: rotate(1.2deg) scale(1.015); }
            50% { transform: rotate(0deg) scale(1); }
            75% { transform: rotate(-1.2deg) scale(1.015); }
        }
        
        #wrapperInvitacion {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1; 
        }

        .invitacion-interna {
            opacity: 0;
            transform: scale(0.9);
        }

        /* Estado Abierto */
        .abierto .sobre {
            opacity: 0;
            transform: translateY(-120px) scale(0.8);
            pointer-events: none; 
            animation: none; 
        }

        .abierto .invitacion-interna {
            opacity: 1;
            transform: scale(1);
        }

        /* Texto inicial con pulso */
        .texto-clic {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Dancing Script', cursive;
            font-size: 2.8rem;
            z-index: 110;
            pointer-events: none;
            width: 100%;
            color: #fff;
            text-shadow: 2px 2px 12px rgba(0,0,0,0.8);
            animation: pulso-solido 2s ease-in-out infinite;
        }

        @keyframes pulso-solido {
            0%, 100% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.08); }
        }

        /* Botones finales */
        .botones-container {
            margin-top: 25px;
            display: none; 
            flex-direction: column;
            align-items: center;
            width: 100%;
            z-index: 120;
            gap: 15px;
        }

        .texto-ola {
            font-family: 'Dancing Script', cursive;
            font-size: 1.8rem;
            color: rgba(245, 240, 230, 0.3);
            background: linear-gradient(to right, rgba(245, 240, 230, 0.3) 0%, rgba(245, 240, 230, 1) 50%, rgba(245, 240, 230, 0.3) 100%);
            background-size: 200% auto;
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: ola-derecha 3.5s linear infinite;
        }

        @keyframes ola-derecha {
            0% { background-position: 200% center; }
            100% { background-position: -200% center; }
        }

        /* Zoom y Modales */
        #modalZoom {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.98);
            z-index: 300;
            justify-content: center;
            align-items: center;
            overflow: auto;
        }

        #imgZoomContainer {
            max-width: 90%;
            max-height: 85vh;
            transition: transform 0.4s ease;
            cursor: zoom-in;
        }

        #imgZoomContainer.zoomed-in {
            transform: scale(2);
            cursor: zoom-out;
        }

        .btn-musica-flotante {
            position: fixed;
            bottom: 25px; right: 25px;
            background: white; border-radius: 50%;
            width: 55px; height: 55px;
            border: 2px solid #cda87a;
            z-index: 150;
            display: none;
            justify-content: center; align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }
    </style>
</head>
<body>

    <audio id="musica" src="SONG.m4a" loop preload="auto"></audio>

    <div class="contenedor-principal" id="mainContainer">
        <div class="texto-clic" id="hintText">¡Toca para abrir!</div>
        
        <div id="wrapperInvitacion" onclick="abrirZoom()">
            <img src="2.png" class="imagen-capa invitacion-interna">
        </div>
        
        <img src="1.png" class="imagen-capa sobre" id="imgSobre" onclick="abrirSobre()">
        
        <div class="botones-container" id="botonesNavegacion">
            <button style="background:none; border:none; cursor:pointer;" onclick="abrirModal('modalReligiosa')">
                <span class="texto-ola">⤷ Ceremonia Religiosa</span>
            </button>
            <button style="background:none; border:none; cursor:pointer;" onclick="abrirModal('modalCivil')">
                <span class="texto-ola">⤷ Ceremonia Civil y Recepción</span>
            </button>
        </div>
    </div>

    <!-- Modal Zoom -->
    <div id="modalZoom" onclick="cerrarZoom()">
        <img src="2.png" id="imgZoomContainer" onclick="hacerZoomDoble(event)">
    </div>

    <!-- Botón Música -->
    <button id="btnMusic" class="btn-musica-flotante" onclick="toggleMusic()">
        <span id="musicIcon" style="color:#cda87a; font-weight:bold;">||</span>
    </button>

    <script>
        const audio = document.getElementById('musica');
        const container = document.getElementById('mainContainer');
        const btnM = document.getElementById('btnMusic');
        const imgZoom = document.getElementById('imgZoomContainer');

        function fadeInAudio(duration) {
            audio.volume = 0;
            audio.play();
            let vol = 0;
            let interval = 50;
            let step = interval / duration;
            let fade = setInterval(() => {
                if (vol < 1) { vol += step; audio.volume = Math.min(vol, 1); }
                else { clearInterval(fade); }
            }, interval);
        }

        function abrirSobre() {
            container.classList.add('abierto');
            document.getElementById('hintText').style.display = 'none';
            fadeInAudio(5000);
            btnM.style.display = 'flex';
            setTimeout(() => { document.getElementById('botonesNavegacion').style.display = 'flex'; }, 600);
        }

        function toggleMusic() {
            if (audio.paused) { audio.play(); document.getElementById('musicIcon').innerText = '||'; }
            else { audio.pause(); document.getElementById('musicIcon').innerText = '▶'; }
        }

        function abrirZoom() { document.getElementById('modalZoom').style.display = 'flex'; document.body.style.overflow = 'hidden'; }
        function cerrarZoom() { document.getElementById('modalZoom').style.display = 'none'; document.body.style.overflow = 'auto'; imgZoom.classList.remove('zoomed-in'); }
        function hacerZoomDoble(e) { e.stopPropagation(); imgZoom.classList.toggle('zoomed-in'); }

        // Aquí puedes añadir las funciones abrirModal('modalReligiosa'), etc.
    </script>
</body>
</html>
