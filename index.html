<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Boda Blanca y Manuel</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;600&display=swap" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0; padding: 0;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            width: 100vw;
            overflow-x: hidden;
            font-family: 'Poppins', sans-serif;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: url('3.jpg');
            background-size: cover;
            background-position: center;
            filter: blur(12px) brightness(0.6); 
            z-index: -1;
        }

        .contenedor-principal {
            position: relative;
            width: 90%;
            max-width: 500px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .imagen-capa {
            width: 100%;
            height: auto;
            border-radius: 8px; 
            box-shadow: 0 15px 40px rgba(0,0,0,0.7);
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* --- ANIMACIÓN LENTA (VALSEADO) --- */
        .sobre { 
            position: relative; 
            z-index: 100; 
            cursor: pointer;
            /* 8 segundos para que sea extremadamente lenta */
            animation: sobre-valseado-lento 8s ease-in-out infinite;
            transform-origin: bottom center;
        }

        @keyframes sobre-valseado-lento {
            0%, 100% { transform: rotate(0deg) scale(1); }
            25% { transform: rotate(0.6deg) scale(1.01); }
            50% { transform: rotate(0deg) scale(1.02); }
            75% { transform: rotate(-0.6deg) scale(1.01); }
        }
        
        #wrapperInvitacion {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1; 
            pointer-events: none;
        }

        .invitacion-interna {
            opacity: 0;
            transform: scale(0.9);
        }

        .abierto .sobre {
            opacity: 0;
            transform: translateY(-120px) scale(0.8);
            pointer-events: none; 
            animation: none; 
        }

        .abierto .invitacion-interna {
            opacity: 1;
            transform: scale(1);
        }

        .abierto #wrapperInvitacion {
            pointer-events: auto;
            z-index: 10;
        }

        .texto-clic {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Dancing Script', cursive;
            font-size: 2.8rem;
            z-index: 110;
            pointer-events: none;
            width: 100%;
            color: #fff;
            text-shadow: 2px 2px 12px rgba(0,0,0,0.8);
            animation: pulso-solido 3s ease-in-out infinite;
        }

        @keyframes pulso-solido {
            0%, 100% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.05); }
        }

        .botones-container {
            margin-top: 25px;
            display: none; 
            flex-direction: column;
            align-items: center;
            width: 100%;
            z-index: 150; 
            gap: 15px;
            position: relative;
        }

        .btn-invisible {
            background: none;
            border: none;
            cursor: pointer;
            padding: 10px;
            width: 100%;
        }

        .texto-ola {
            font-family: 'Dancing Script', cursive;
            font-size: 1.8rem;
            color: rgba(245, 240, 230, 0.4);
            background: linear-gradient(to right, rgba(245, 240, 230, 0.4) 0%, rgba(245, 240, 230, 1) 50%, rgba(245, 240, 230, 0.4) 100%);
            background-size: 200% auto;
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: ola-derecha 4s linear infinite;
        }

        @keyframes ola-derecha {
            0% { background-position: 200% center; }
            100% { background-position: -200% center; }
        }

        /* BOTÓN DE CIERRE (X) MEJORADO */
        .cerrar-zoom-x {
            position: fixed;
            top: 30px;
            right: 30px;
            width: 45px;
            height: 45px;
            background: rgba(255, 255, 255, 0.3); /* Círculo de fondo */
            backdrop-filter: blur(10px);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            z-index: 1000; /* Siempre arriba de todo */
            border: 2px solid rgba(255,255,255,0.5);
        }

        .cerrar-zoom-x svg {
            width: 24px;
            height: 24px;
            fill: #fff;
        }

        #modalZoom {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.98);
            z-index: 900;
            justify-content: center;
            align-items: center;
            overflow: auto;
        }

        #imgZoomContainer {
            max-width: 90%;
            max-height: 85vh;
            transition: transform 0.4s ease;
            cursor: zoom-in;
        }

        #imgZoomContainer.zoomed-in {
            transform: scale(2.2);
            cursor: zoom-out;
        }

        .btn-musica-flotante {
            position: fixed;
            bottom: 25px; right: 25px;
            background: white; border-radius: 50%;
            width: 55px; height: 55px;
            border: 2px solid #cda87a;
            z-index: 700;
            display: none;
            justify-content: center; align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            cursor: pointer;
        }

        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); 
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1200;
            padding: 20px;
        }

        .modal-content {
            background: white;
            padding: 25px;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
    </style>
</head>
<body>

    <audio id="musica" src="SONG.m4a" loop preload="auto"></audio>

    <div class="contenedor-principal" id="mainContainer">
        <div class="texto-clic" id="hintText">¡Toca para abrir!</div>
        
        <div id="wrapperInvitacion" onclick="abrirZoom()">
            <img src="2.png" class="imagen-capa invitacion-interna">
        </div>
        
        <img src="1.png" class="imagen-capa sobre" id="imgSobre" onclick="abrirSobre()">
        
        <div class="botones-container" id="botonesNavegacion">
            <button class="btn-invisible" onclick="abrirModal('modalReligiosa')">
                <span class="texto-ola">⤷ Ceremonia Religiosa</span>
            </button>
            <button class="btn-invisible" onclick="abrirModal('modalCivil')">
                <span class="texto-ola">⤷ Ceremonia Civil y Recepción</span>
            </button>
        </div>
    </div>

    <!-- MODAL ZOOM CON X VISIBLE -->
    <div id="modalZoom">
        <div class="cerrar-zoom-x" onclick="cerrarZoom()">
            <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
        </div>
        <img src="2.png" id="imgZoomContainer" onclick="hacerZoomDoble(event)">
    </div>

    <!-- MODALES DE INFORMACIÓN -->
    <div id="modalReligiosa" class="modal" onclick="cerrarModal('modalReligiosa')">
        <div class="modal-content" onclick="event.stopPropagation()">
            <img src="iglesia.png" class="img-modal">
            <h2 style="font-family:'Dancing Script'; color:#cda87a;">Ceremonia Religiosa</h2>
            <p>Templo de la Inmaculada Concepción<br>Angangueo, Michoacán | 1:00 PM</p>
            <button onclick="cerrarModal('modalReligiosa')" style="background:none; border:none; color:#4a3728; font-family:'Dancing Script'; font-size:1.8rem; cursor:pointer;">Regresar</button>
        </div>
    </div>

    <div id="modalCivil" class="modal" onclick="cerrarModal('modalCivil')">
        <div class="modal-content" onclick="event.stopPropagation()">
            <img src="4.jpeg" class="img-modal">
            <h2 style="font-family:'Dancing Script'; color:#cda87a;">Civil y Recepción</h2>
            <p>San José del Rincón, Edo. Méx.<br>Civil: 5:00 PM | Recepción: 5:40 PM</p>
            <a href="https://maps.app.goo.gl/HfGtWeRviQj9LwW76" target="_blank" style="display:block; background:#cda87a; color:white; padding:10px; border-radius:20px; text-decoration:none; margin:10px 0;">📍 Cómo llegar</a>
            <button onclick="cerrarModal('modalCivil')" style="background:none; border:none; color:#4a3728; font-family:'Dancing Script'; font-size:1.8rem; cursor:pointer;">Regresar</button>
        </div>
    </div>

    <button id="btnMusic" class="btn-musica-flotante" onclick="toggleMusic()">
        <span id="musicIcon" style="color:#cda87a; font-weight:bold; font-size: 1.2rem;">||</span>
    </button>

    <script>
        const audio = document.getElementById('musica');
        const container = document.getElementById('mainContainer');
        const btnM = document.getElementById('btnMusic');
        const btnsNav = document.getElementById('botonesNavegacion');
        const imgZoom = document.getElementById('imgZoomContainer');
        let isOpen = false;

        function fadeInAudio(duration) {
            audio.volume = 0;
            audio.play().catch(e => console.log("Audio play blocked"));
            let vol = 0;
            let interval = 50;
            let step = interval / duration;
            let fade = setInterval(() => {
                if (vol < 1) { vol += step; audio.volume = Math.min(vol, 1); }
                else { clearInterval(fade); }
            }, interval);
        }

        function abrirSobre() {
            if (!isOpen) {
                container.classList.add('abierto');
                document.getElementById('hintText').style.display = 'none';
                fadeInAudio(5000); 
                btnM.style.display = 'flex';
                setTimeout(() => { btnsNav.style.display = 'flex'; }, 600);
                isOpen = true;
            }
        }

        function toggleMusic() {
            if (audio.paused) { audio.play(); document.getElementById('musicIcon').innerText = '||'; }
            else { audio.pause(); document.getElementById('musicIcon').innerText = '▶'; }
        }

        function abrirZoom() { 
            document.getElementById('modalZoom').style.display = 'flex'; 
            document.body.style.overflow = 'hidden'; 
        }

        function cerrarZoom() { 
            document.getElementById('modalZoom').style.display = 'none'; 
            document.body.style.overflow = 'auto';
            imgZoom.classList.remove('zoomed-in');
        }

        function hacerZoomDoble(e) { 
            e.stopPropagation(); 
            imgZoom.classList.toggle('zoomed-in');
        }

        function abrirModal(id) { document.getElementById(id).style.display = 'flex'; }
        function cerrarModal(id) { document.getElementById(id).style.display = 'none'; }

        window.onclick = function(event) {
            if (event.target.classList.contains('modal')) {
                cerrarModal(event.target.id);
            }
        }
    </script>
</body>
</html>
